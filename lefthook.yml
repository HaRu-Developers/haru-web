pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    prettier:
      run: pnpm format:check

prepare-commit-msg:
  commands:
    add-prefix:
      run: node scripts/prepare-commit-msg.js {{1}}

commit-msg:
  commands:
    lint-message:
      run: node scripts/run-commitlint.js {{1}}

pre-rebase:
  commands:
    check-clean:
      run: node scripts/pre-rebase-check.js
