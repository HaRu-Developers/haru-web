pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '**/*.{js,ts,jsx,tsx}'
      run: pnpm exec eslint {staged_files} --fix
      stage_fixed: true
    prettier:
      glob: '**/*.{js,ts,jsx,tsx,json,yaml,md,css}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    type-check:
      run: pnpm type-check

prepare-commit-msg:
  commands:
    add-prefix:
      run: node scripts/prepare-commit-msg.cjs {{1}}

commit-msg:
  commands:
    lint-message:
      run: node scripts/run-commitlint.cjs {{1}}

pre-rebase:
  commands:
    check-clean:
      run: node scripts/pre-rebase-check.cjs

pre-push:
  commands:
    build:
      run: pnpm build
