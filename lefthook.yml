pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm lint:staged {staged_files}
      stage_fixed: true
    prettier:
      run: pnpm format:staged {staged_files}
      stage_fixed: true
    type-check:
      run: pnpm type-check

prepare-commit-msg:
  commands:
    add-prefix:
      run: node scripts/prepare-commit-msg.cjs {{1}}

commit-msg:
  commands:
    lint-message:
      run: node scripts/run-commitlint.cjs {{1}}

pre-rebase:
  commands:
    check-clean:
      run: node scripts/pre-rebase-check.cjs

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm type-check
    build:
      run: pnpm build
